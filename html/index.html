<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monedero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="../img/logo_monedero.png" type="image/png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/general-styles.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Implementación de sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body class="login-page">
<aside class="left-panel">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-coins"></i></div>
      <span class="brand-name">Monedero</span>
    </div>
    <div class="hero-content">
      <h2>Toma el control<br>de tus <span>finanzas</span><br>personales.</h2>
      <p>Registra, analiza y organiza todos tus gastos en un solo lugar.</p>
    </div>
    <p class="left-footer">© 2026 Monedero · MD23005 · CM23137 · MM22090 · CG22079</p>
  </aside>

  <main class="right-panel">
    <div class="login-box">
      <h1>Bienvenido</h1>
      <p class="subtitle">Inicia sesión para gestionar tus gastos</p>

      <form method="post" id="login-monedero">
        <div class="form-group">
          <label for="username" >Nombre de usuario</label>
          <div class="input-wrap">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="username" placeholder="Nombre de usuario" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" />
            <i class="fa-regular fa-eye toggle-icon" id="toggle-pswrd"></i>
          </div>
        </div>
        <button type="submit" class="btn-primary full">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Iniciar sesión
        </button>
      </form>

      <div class="divider"><span>o</span></div>

      <button class="btn-secondary full" id="btn-continuar">
        <i class="fa-regular fa-user"></i> Continuar sin sesión
      </button>
    </div>
  </main>

    <!-- Script para validar el login -->
    <script src="../js/login_register.js"></script>
    
</body>

</html>
