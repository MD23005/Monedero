<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="icon" href="../img/logo_monedero.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Monedero</title>

    <link rel="stylesheet" href="../css/general-styles.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/usr-profile.css">

    <!-- implementación de sweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar menu -->
    <nav class="sidebar">
        <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-coins"></i></div>
        <span class="brand-name">Monedero</span>
        </div>
        <div class="nav-section">
        <p class="nav-label">Principal</p>
        <a class="nav-item" href="home.html"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="usr-profile.html" class="nav-item active"><i class="fa-solid fa-user"></i> Perfil</a>
        </div>
        <div class="sidebar-footer">
        <div class="user-chip">
            <div id="avatar" class="avatar"></div>
            <div class="user-info">
            <p id="username-display"></p>
            <p class="user-role"></p>
            </div>
            <a class="icon-btn" id="btn-logout" title="Cerrar sesión">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </a>
        </div>
        </div>
    </nav>

    <!--Contenido principal-->
    <section class="main-content">
        <div class="usr-card">
            <div class="usr-logo">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            
            <div class="txt-container">
                <h2 class="username-txt">
                    Nombre de usuario
                </h2>
                <p id="username-display"></p>
            </div>

            <div class="btn-container">
                <button id="btn-logout">Cerrar sesión</button>
            </div>
        </div>
    </section>
</body>
</html>
